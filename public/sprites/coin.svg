<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Shadow -->
  <ellipse cx="16" cy="29.5" rx="10" ry="2" fill="rgba(0,0,0,0.18)"/>
  <!-- Coin body -->
  <circle cx="16" cy="15" r="12" fill="#f9ca24" stroke="#e6b800" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="16" cy="15" r="9" fill="none" stroke="#e6b800" stroke-width="1"/>
  <!-- "G" for Goofe -->
